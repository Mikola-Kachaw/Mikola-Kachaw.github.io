<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЫБЕРИТЕ ИГРУ</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <script src="js/index.js" defer></script>
</head>
<body>
    <audio preload="auto" autoplay loop  id="theme" src="/assets/sound/Select Screen.mp3"></audio>
    <div class="container">
        <h1 style="padding: 100px; text-align: center; font-weight: bolder;">ВЫБЕРИТЕ ИГРУ</h1>
        <div class="pagesel">
            <div class="character">
                <button onclick="setTimeout(()=>{window.location.href = 'sonicgame.html';},1900)" id="sonicgame" class="charshow ssonic">
                    <img class="selectimg" src="assets/Sonic.webp" alt="">
                </button>
                <p style="font-size: large;">Лабиринт<br>с Соником</p>
            </div>
            <div class="character">
                <button onclick="setTimeout(()=>{window.location.href = 'tailsgame.html';},800)" id="tailsgame" class="charshow stails" >
                    <img class="selectimg" src="assets/Tails.webp" alt="">
                </button>
                <p style="font-size: large;">Уроки рисования<br>с Тейлзом</p>
            </div>
            <div class="character">
                <button onclick="setTimeout(()=>{window.location.href = 'knucklesgame.html';},2000)" id="knucklesgame" class="charshow sknux">
                    <img class="selectimg" src="assets/Knuckles.webp" alt="">
                </button>
                <p style="font-size: large;">Против<br>Наклза</p>
            </div>
        </div>
        <button onclick="setTimeout(()=>{window.location.href = 'index.html';},900)" id="back"class="swf">НАЗАД</button>
    </div>
</body>
</html>
